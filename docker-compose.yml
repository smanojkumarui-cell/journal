version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tech-editor-postgres
    environment:
      POSTGRES_USER: techeditor
      POSTGRES_PASSWORD: TechEditor2024!
      POSTGRES_DB: techeditor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techeditor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tech-editor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: tech-editor-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=techeditor;Username=techeditor;Password=TechEditor2024!"
      Redis__ConnectionString: "redis:6379"
      JWT__Key: "TechEditor-Super-Secret-Key-For-JWT-Token-Generation-2024"
      JWT__Issuer: "TechEditor"
      JWT__Audience: "TechEditor"
      Google__ClientId: "${GOOGLE_CLIENT_ID}"
      Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/publish

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: tech-editor-web
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data: